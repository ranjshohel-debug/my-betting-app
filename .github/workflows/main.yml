name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip3 install --upgrade Cython==0.29.33 buildozer virtualenv

      - name: Pre-accept Android Licenses
        run: |
          # SDK ম্যানেজার থেকে অটোমেটিক লাইসেন্স এক্সেপ্ট করার কমান্ড
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          export PATH=$PATH:$HOME/.local/bin
          # সরাসরি Buildozer-এর মাধ্যমে লাইসেন্স কোয়েরি করা
          yes | buildozer android p4a --query-licenses || true

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # -v মানে ভারবোস মোড, যাতে আমরা ডিটেইল লগ দেখতে পারি
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SR-BET-AI-PRO-APK
          path: bin/*.apk
