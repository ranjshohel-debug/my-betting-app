name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev lld
          pip3 install --upgrade Cython==0.29.33 buildozer virtualenv

      - name: Build APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # এটি লাইসেন্স এবং বিল্ড একসাথে হ্যান্ডেল করবে
          yes | buildozer -v android debug
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SR-BET-AI-PRO-APK
          path: bin/*.apk
